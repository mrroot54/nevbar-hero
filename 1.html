<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NextGen | Premium Tech</title>
    
    <!-- Modern Tech Font -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
    
    <!-- Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <style>
        /* --- RESET & BASICS --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #000000;
            color: #ffffff;
            overflow-x: hidden; /* Horizontal scroll band karo */
        }

        /* --- NAVBAR (Glassmorphism) --- */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 25px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.3); /* Transparent black */
            backdrop-filter: blur(15px); /* Glass blur effect */
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: 2px;
            color: #fff;
            text-transform: uppercase;
        }
        
        .logo span { color: #00d2ff; }

        .nav-menu { display: flex; gap: 40px; }

        .nav-menu a {
            text-decoration: none;
            color: #cccccc;
            font-size: 0.95rem;
            font-weight: 500;
            transition: 0.3s;
            position: relative;
        }

        /* Hover Animation: Underline slide */
        .nav-menu a::after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            bottom: -5px;
            left: 0;
            background-color: #00d2ff;
            transition: width 0.3s ease;
        }

        .nav-menu a:hover { color: #fff; }
        .nav-menu a:hover::after { width: 100%; }

        .btn-contact {
            padding: 12px 25px;
            background: transparent;
            border: 1px solid #ffffff;
            color: #fff;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.3s;
            font-weight: 600;
        }

        .btn-contact:hover {
            background: #fff;
            color: #000;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.4);
        }

        /* --- HERO SECTION --- */
        #hero {
            position: relative;
            height: 100vh;
            width: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            overflow: hidden;
        }

        /* 3D Canvas behind everything */
        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            opacity: 0.6; /* Thoda transparent taaki text clear dikhe */
        }

        .hero-text {
            position: relative;
            z-index: 1;
            max-width: 800px;
            padding: 0 20px;
        }

        /* Big Headline Styling */
        h1 {
            font-size: 5rem;
            line-height: 1.1;
            font-weight: 700;
            margin-bottom: 20px;
            background: linear-gradient(180deg, #ffffff 0%, #a0a0a0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -2px;
        }

        .subtitle {
            font-size: 1.2rem;
            color: #a0a0a0;
            margin-bottom: 40px;
            font-weight: 300;
            letter-spacing: 1px;
        }

        .hero-btn-group {
            display: flex;
            gap: 20px;
            justify-content: center;
        }

        .primary-btn {
            padding: 15px 40px;
            background: #00d2ff;
            color: #000;
            border: none;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .primary-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.6);
        }

        .secondary-btn {
            padding: 15px 40px;
            background: transparent;
            color: #fff;
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .secondary-btn:hover {
            border-color: #fff;
            background: rgba(255,255,255,0.1);
        }

        /* Scroll Down Indicator */
        .scroll-indicator {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1;
            animation: bounce 2s infinite;
            opacity: 0.5;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0) translateX(-50%);}
            40% {transform: translateY(-10px) translateX(-50%);}
            60% {transform: translateY(-5px) translateX(-50%);}
        }

        /* --- MOBILE --- */
        @media (max-width: 768px) {
            h1 { font-size: 3rem; }
            .nav-menu { display: none; } /* Hide menu for simple mobile view */
            .btn-contact { display: none; }
        }
    </style>
</head>
<body>

    <!-- NAVBAR -->
    <nav>
        <div class="logo">NEXT<span>GEN</span>.</div>
        <div class="nav-menu">
            <a href="#">Work</a>
            <a href="#">Services</a>
            <a href="#">About</a>
            <a href="#">Careers</a>
        </div>
        <button class="btn-contact">Let's Talk</button>
    </nav>

    <!-- HERO SECTION -->
    <section id="hero">
        <!-- 3D Background Container -->
        <div id="canvas-container"></div>

        <div class="hero-text">
            <h1>Architects of<br>Digital Reality.</h1>
            <p class="subtitle">We build high-performance web apps, automated systems, and immersive 3D experiences.</p>
            
            <div class="hero-btn-group">
                <button class="primary-btn">Start Project</button>
                <button class="secondary-btn">View Portfolio</button>
            </div>
        </div>

        <div class="scroll-indicator">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
                <path d="M7 13l5 5 5-5M7 6l5 5 5-5"/>
            </svg>
        </div>
    </section>

    <!-- THREE.JS SCRIPT (Digital Terrain Effect) -->
    <script>
        // --- 1. SETUP ---
        const scene = new THREE.Scene();
        // Dark fog for depth fading
        scene.fog = new THREE.FogExp2(0x000000, 0.03);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 5;      // Z position
        camera.position.y = 2;      // Lift camera up slightly
        camera.rotation.x = -0.5;   // Look down slightly

        const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // Performance optimization
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // --- 2. CREATE WIREFRAME TERRAIN ---
        // PlaneGeometry(width, height, widthSegments, heightSegments)
        // More segments = smoother waves but heavier performance
        const geometry = new THREE.PlaneGeometry(20, 20, 60, 60); 

        const material = new THREE.MeshBasicMaterial({ 
            color: 0x00d2ff,       // Cyan color
            wireframe: true,       // This makes it look like a grid
            transparent: true,
            opacity: 0.15          // Very subtle
        });

        const plane = new THREE.Mesh(geometry, material);
        scene.add(plane);

        // --- 3. ANIMATION VARIABLES ---
        let count = 0;
        const clock = new THREE.Clock();

        // Store original positions
        const positionAttribute = geometry.attributes.position;
        const vertex = new THREE.Vector3();

        // --- 4. ANIMATION LOOP ---
        function animate() {
            requestAnimationFrame(animate);
            
            const time = clock.getElapsedTime();

            // Loop through every vertex (point) in the grid
            for (let i = 0; i < positionAttribute.count; i++) {
                // Get the original X and Y coordinates
                vertex.fromBufferAttribute(positionAttribute, i);
                
                // Create the wave formula
                // Z = height of the wave
                // We use Sin and Cos based on X, Y, and Time
                const waveX = 0.5 * Math.sin(vertex.x * 2 + time);
                const waveY = 0.25 * Math.sin(vertex.y * 3 + time);
                
                // Apply the new Z height
                // We only modify Z because it's a flat plane moving up/down
                positionAttribute.setZ(i, waveX + waveY);
            }

            // Important: Tell Three.js the positions changed
            positionAttribute.needsUpdate = true;

            // Slight rotation of the whole plane
            plane.rotation.z = 0.1 * Math.sin(time * 0.1);

            renderer.render(scene, camera);
        }

        animate();

        // --- 5. RESIZE HANDLER ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
